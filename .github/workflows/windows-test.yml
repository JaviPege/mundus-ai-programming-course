# Verifies the AI E-Bike Fleet Manager workshop on REAL Windows.
# Runs the full headless test suite (tools/windows-verify.ps1) on a
# windows-latest runner: project load, grounding, function calling,
# guard plugin and the autonomous agent — using OpenCode's free models
# (no API key, no billing).
name: windows-verify

on:
  push:
  workflow_dispatch:

jobs:
  windows-test:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCode CLI
        # Node.js is preinstalled on windows-latest runners.
        run: npm i -g opencode-ai

      - name: Show versions
        run: |
          opencode --version
          python --version

      - name: Run the Windows verification suite
        shell: pwsh
        run: tools\windows-verify.ps1
